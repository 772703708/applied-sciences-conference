{% extends "base.html" %}

{% block title %}إعادة تعيين كلمة المرور - المؤتمر العلمي الدولي الأول{% endblock %}

{% block content %}
<div class="reset-password-page">
    <div class="reset-container">
        <div class="reset-card">
            <div class="reset-header">
                <img src="{{ url_for('static', filename='images/icon/Profile 1.png') }}" alt="Reset Password"
                    class="reset-icon">
                <h1>إعادة تعيين كلمة المرور</h1>
                <p>أدخل كلمة المرور الجديدة</p>
            </div>

            <form method="POST" class="reset-form">
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <i class="fas fa-eye toggle-password" onclick="togglePassword('password-field')"></i>
                    <input type="password" name="password" id="password-field" class="input-field"
                        placeholder="كلمة المرور الجديدة" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-check-circle"></i>
                    <i class="fas fa-eye toggle-password" onclick="togglePassword('confirm-field')"></i>
                    <input type="password" name="confirm_password" id="confirm-field" class="input-field"
                        placeholder="تأكيد كلمة المرور" required>
                </div>

                <button type="submit" class="submit-btn">إعادة تعيين كلمة المرور</button>
            </form>
        </div>
    </div>
</div>

<style>
    .reset-password-page {
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
    }

    .reset-container {
        width: 100%;
        max-width: 450px;
    }

    .reset-card {
        background: var(--bg-light);
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
        text-align: center;
    }

    .reset-header {
        margin-bottom: 30px;
    }

    .reset-icon {
        width: 80px;
        height: 80px;
        margin-bottom: 20px;
    }

    .reset-header h1 {
        color: var(--primary-color);
        margin-bottom: 10px;
    }

    .reset-header p {
        color: var(--text-light);
    }

    .input-group {
        position: relative;
        margin: 15px 0;
    }

    .input-group i:first-child {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #aaa;
    }

    .toggle-password {
        left: 15px !important;
        right: auto !important;
        cursor: pointer;
    }

    .input-field {
        width: 100%;
        padding: 14px 45px 14px 45px;
        border: 2px solid var(--border-color);
        border-radius: 12px;
        font-size: 14px;
        background: var(--bg-light);
        color: var(--text-color);
    }

    .input-field:focus {
        border-color: var(--secondary-color);
        outline: none;
    }

    .submit-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, var(--secondary-color), var(--secondary-dark));
        color: var(--primary-dark);
        border: none;
        border-radius: 50px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 20px;
        transition: all 0.3s ease;
    }

    .submit-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(201, 160, 61, 0.3);
    }

    .alert {
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 20px;
    }

    .alert-danger {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
    }

    .alert-success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
    }

    @media (max-width: 480px) {
        .reset-card {
            padding: 25px;
        }
    }
</style>

<script>
    function togglePassword(fieldId) {
        const field = document.getElementById(fieldId);
        const toggleIcon = field.parentElement.querySelector('.toggle-password');

        if (field.type === 'password') {
            field.type = 'text';
            toggleIcon.classList.remove('fa-eye');
            toggleIcon.classList.add('fa-eye-slash');
        } else {
            field.type = 'password';
            toggleIcon.classList.remove('fa-eye-slash');
            toggleIcon.classList.add('fa-eye');
        }
    }
</script>
{% endblock %}
