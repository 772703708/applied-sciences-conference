<style>
    /* ========================================
   Sidebar Styles - متجاوب بالكامل
   ======================================== */
    .admin-sidebar {
        width: 280px;
        background: linear-gradient(180deg, #1a4a6e 0%, #0e3a58 100%);
        color: white;
        transition: all 0.3s ease;
        position: fixed;
        right: 0;
        top: 0;
        height: 100vh;
        z-index: 1000;
        display: flex;
        flex-direction: column;
        box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        overflow: hidden;
    }

    /* Sidebar Collapsed */
    .admin-sidebar.collapsed {
        width: 70px;
    }

    .admin-sidebar.collapsed .sidebar-logo-text,
    .admin-sidebar.collapsed .sidebar-nav li a span,
    .admin-sidebar.collapsed .sidebar-footer p,
    .admin-sidebar.collapsed .sidebar-footer small {
        display: none;
    }

    .admin-sidebar.collapsed .sidebar-logo {
        justify-content: center;
        padding: 15px 0;
    }

    .admin-sidebar.collapsed .sidebar-nav li a {
        justify-content: center;
        padding: 12px;
    }

    .admin-sidebar.collapsed .sidebar-nav li a i {
        margin: 0;
        font-size: 1.3rem;
    }

    /* Sidebar Toggle Button */
    .sidebar-toggle {
        position: absolute;
        left: -12px;
        top: 20px;
        width: 24px;
        height: 24px;
        background: #c9a03d;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 1001;
        transition: all 0.3s ease;
        border: none;
        color: white;
    }

    .admin-sidebar.collapsed .sidebar-toggle {
        left: -12px;
    }

    .admin-sidebar.collapsed .sidebar-toggle i {
        transform: rotate(180deg);
    }

    /* Sidebar Logo */
    .sidebar-logo {
        padding: 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        margin-bottom: 15px;
    }

    .sidebar-logo img {
        width: 45px;
        height: 45px;
        object-fit: contain;
        border-radius: 10px;
    }

    .sidebar-logo-text h3 {
        font-size: 0.9rem;
        margin: 0;
        line-height: 1.3;
    }

    .sidebar-logo-text p {
        font-size: 0.65rem;
        opacity: 0.7;
        margin: 3px 0 0;
    }

    /* Sidebar Navigation Wrapper - للتمرير */
    .sidebar-nav-wrapper {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 0 10px;
        margin-bottom: 0;
    }

    /* Custom Scrollbar */
    .sidebar-nav-wrapper::-webkit-scrollbar {
        width: 4px;
    }

    .sidebar-nav-wrapper::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
    }

    .sidebar-nav-wrapper::-webkit-scrollbar-thumb {
        background: #c9a03d;
        border-radius: 4px;
    }

    .sidebar-nav-wrapper::-webkit-scrollbar-thumb:hover {
        background: #a8822a;
    }

    /* Sidebar Navigation */
    .sidebar-nav {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .sidebar-nav li {
        margin-bottom: 3px;
    }

    .sidebar-nav li a {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        color: rgba(255, 255, 255, 0.8);
        text-decoration: none;
        transition: all 0.3s ease;
        font-size: 0.85rem;
        border-radius: 10px;
        white-space: nowrap;
    }

    .sidebar-nav li a i {
        width: 22px;
        font-size: 1rem;
        text-align: center;
    }

    .sidebar-nav li a:hover {
        background: rgba(201, 160, 61, 0.2);
        color: #c9a03d;
    }

    .sidebar-nav li.active a {
        background: rgba(201, 160, 61, 0.3);
        color: #c9a03d;
    }

    /* زر تسجيل الخروج داخل القائمة */
    .logout-li {
        margin-top: 20px;
        padding-top: 10px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logout-li a {
        background: rgba(220, 38, 38, 0.15);
        color: rgba(255, 255, 255, 0.9);
    }

    .logout-li a:hover {
        background: #dc2626;
        color: white;
    }

    /* Sidebar Footer */
    .sidebar-footer {
        padding: 12px 15px;
        text-align: center;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        font-size: 0.65rem;
        opacity: 0.7;
        background: rgba(0, 0, 0, 0.2);
    }

    .sidebar-footer p {
        margin: 0 0 3px;
    }

    .sidebar-footer small {
        font-size: 0.6rem;
    }

    /* ========================================
   Responsive Sidebar
   ======================================== */
    @media (max-width: 992px) {
        .admin-sidebar {
            transform: translateX(100%);
            width: 260px;
            z-index: 1050;
        }

        .admin-sidebar.mobile-open {
            transform: translateX(0);
        }

        .admin-sidebar.collapsed {
            width: 260px;
            transform: translateX(100%);
        }

        .admin-sidebar.collapsed.mobile-open {
            transform: translateX(0);
        }

        .admin-sidebar.collapsed .sidebar-logo-text,
        .admin-sidebar.collapsed .sidebar-nav li a span,
        .admin-sidebar.collapsed .sidebar-footer p,
        .admin-sidebar.collapsed .sidebar-footer small {
            display: block;
        }

        .admin-sidebar.collapsed .sidebar-logo {
            justify-content: flex-start;
            padding: 20px;
        }

        .admin-sidebar.collapsed .sidebar-nav li a {
            justify-content: flex-start;
            padding: 10px 12px;
        }

        .admin-sidebar.collapsed .sidebar-nav li a i {
            margin-left: 0;
            font-size: 1rem;
        }

        .mobile-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1040;
            display: none;
        }

        .mobile-overlay.active {
            display: block;
        }
    }

    @media (max-width: 576px) {
        .admin-sidebar {
            width: 85%;
            max-width: 280px;
        }

        .sidebar-logo img {
            width: 40px;
            height: 40px;
        }

        .sidebar-logo-text h3 {
            font-size: 0.85rem;
        }

        .sidebar-nav li a {
            padding: 8px 12px;
            font-size: 0.8rem;
        }

        .sidebar-nav li a i {
            width: 20px;
            font-size: 0.9rem;
        }
    }

    /* Landscape mode on mobile */
    @media (max-height: 500px) and (orientation: landscape) {
        .sidebar-logo {
            padding: 10px 15px;
            margin-bottom: 5px;
        }

        .sidebar-logo img {
            width: 30px;
            height: 30px;
        }

        .sidebar-logo-text h3 {
            font-size: 0.75rem;
        }

        .sidebar-logo-text p {
            font-size: 0.55rem;
        }

        .sidebar-nav li a {
            padding: 5px 10px;
            font-size: 0.75rem;
        }

        .sidebar-footer {
            padding: 8px 10px;
        }
    }
</style>

<script>
    // Mobile sidebar functionality
    document.addEventListener('DOMContentLoaded', function () {
        const sidebar = document.getElementById('adminSidebar');

        // Create overlay for mobile
        const overlay = document.createElement('div');
        overlay.className = 'mobile-overlay';
        document.body.appendChild(overlay);

        // Close sidebar when clicking on overlay
        overlay.addEventListener('click', function () {
            sidebar.classList.remove('mobile-open');
            overlay.classList.remove('active');
        });

        // Close sidebar on window resize if open
        window.addEventListener('resize', function () {
            if (window.innerWidth > 992) {
                sidebar.classList.remove('mobile-open');
                overlay.classList.remove('active');
            }
        });

        // Store sidebar toggle function globally
        window.toggleMobileSidebar = function () {
            sidebar.classList.toggle('mobile-open');
            overlay.classList.toggle('active');
        };

        // Sidebar toggle function for desktop
        window.toggleSidebar = function () {
            sidebar.classList.toggle('collapsed');
            // Store preference
            localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
        };

        // Load sidebar state
        const collapsed = localStorage.getItem('sidebarCollapsed') === 'true';
        if (collapsed) {
            sidebar.classList.add('collapsed');
        }

        // Set active menu item
        const currentPath = window.location.pathname;
        document.querySelectorAll('.sidebar-nav li a').forEach(function (link) {
            if (link.getAttribute('href') === currentPath) {
                link.closest('li').classList.add('active');
            }
        });
    });
</script>
